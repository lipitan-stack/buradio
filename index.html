<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0f17" />
  <title>Будильник + Радио</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>

<body>
  <div class="app">
    <header class="top">
      <div>
        <div class="title">Будильник</div>
        <div class="sub" id="nowText">—</div>
      </div>

      <button class="icon-btn" id="btnRefresh" title="Обновить">
        <img src="icons/ui/refresh.png" alt="Обновить">
      </button>
    </header>

    <section class="card">
      <div class="row">
        <label class="label" for="alarmTime">Время будильника</label>
        <input id="alarmTime" type="time" />
      </div>

      <div class="row">
        <label class="label" for="soundMode">Звук</label>
        <select id="soundMode">
          <option value="beep">Сигнал</option>
          <option value="radio">Радио</option>
        </select>
      </div>

      <div class="row" id="radioWrap" style="display:none">
        <label class="label" for="stationSelect">Станция</label>
        <select id="stationSelect">
          <option value="">— выбрать —</option>
          <option value="http://maximum.fmtuner.ru/">Maximum</option>
          <option value="http://radiosilver.corbina.net:8000/silver128.mp3">Серебряный дождь</option>
          <option value="http://emgregion.hostingradio.ru:8064/moscow.radio7.mp3">Радио 7</option>
          <option value="http://radio.4duk.ru/4duk128.mp3">4duk (Чипльдук)</option>
        </select>

        <label class="label" for="radioUrl" style="margin-top:10px">URL потока</label>
        <input id="radioUrl" type="text" placeholder="http://.../stream.mp3" />
        <div class="hint">
          Если не играет (особенно Maximum), нужен прямой mp3/aac поток и CORS/HTTPS может мешать в браузере.
        </div>
      </div>

      <div class="row">
        <label class="label" for="snoozeMin">Снуз (мин)</label>
        <input id="snoozeMin" type="number" min="1" max="60" value="5" />
      </div>

      <div class="actions">
        <button class="btn" id="btnArm">
          <img src="icons/ui/alarm.png" alt="">
          <span id="armText">Поставить</span>
        </button>

        <button class="btn secondary" id="btnStop" disabled>
          <img src="icons/ui/stop.png" alt="">
          Стоп
        </button>

        <button class="btn secondary" id="btnSnooze" disabled>
          <img src="icons/ui/snooze.png" alt="">
          Снуз
        </button>
      </div>

      <div class="status">
        <div><span class="muted">Статус:</span> <span id="statusText">не установлен</span></div>
        <div><span class="muted">Следующий звонок:</span> <span id="nextText">—</span></div>
      </div>
    </section>

    <section class="card">
      <div class="row">
        <label class="label">Тест звука</label>
        <div class="actions">
          <button class="btn secondary" id="btnPlayTest">
            <img src="icons/ui/play.png" alt="">
            Play
          </button>
          <button class="btn secondary" id="btnPauseTest">
            <img src="icons/ui/pause.png" alt="">
            Pause
          </button>
          <button class="btn secondary" id="btnVol">
            <img src="icons/ui/volume.png" alt="">
            Громче
          </button>
          <button class="btn secondary" id="btnClock">
            <img src="icons/ui/clock.png" alt="">
            Сейчас
          </button>
          <button class="btn secondary" id="btnRadioMode">
            <img src="icons/ui/radio.png" alt="">
            Радио
          </button>
        </div>
      </div>
    </section>

    <footer class="foot">
      <span class="muted">Совет:</span> добавь на главный экран (PWA). На iOS/Android автозапуск в фоне ограничен.
    </footer>
  </div>

  <audio id="player" crossorigin="anonymous"></audio>

  <script src="app.js"></script>
</body>
</html>
